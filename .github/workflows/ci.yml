name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate Prisma client using a dummy DATABASE_URL
      # (no real DB connection needed just to generate types)
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build (NestJS compile)
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Lint
        run: npx eslint "{src,test}/**/*.ts" --max-warnings=0
        continue-on-error: true   # warns but doesn't fail the pipeline
